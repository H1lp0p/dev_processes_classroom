openapi: 3.0.0
info:
  title: API системы обучения
  version: 2.0.0
  description: API для управления курсами, постами, заданиями и решениями

servers:
  - url: /api/v2

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Общие схемы
    ResponseWrapper:
      type: object
      properties:
        type:
          type: string
          enum: [success, error]
          description: Тип ответа (успех/ошибка)
        message:
          type: string
          nullable: true
          description: Сообщение для отображения на UI
        data:
          type: object
          description: Данные ответа

    Error:
      type: object
      properties:
        type:
          type: string
          enum: [error]
        message:
          type: string
        data:
          type: object
          nullable: true

    # Auth schemas
    RegisterRequest:
      type: object
      required: [credentials, email, password]
      properties:
        credentials:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string

    # User schemas
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        credentials:
          type: string
        email:
          type: string
          format: email

    UpdateUserRequest:
      type: object
      properties:
        credentials:
          type: string
        email:
          type: string
          format: email

    # Course schemas
    CreateCourseRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string

    UpdateCourseRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string

    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string

    CourseInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        role:
          type: string
          enum: [teacher, student]
        authorId:
          type: string
          format: uuid
        inviteCode:
          type: string

    UserCourse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        role:
          type: string
          enum: [teacher, student]

    CourseMember:
      type: object
      properties:
        id:
          type: string
          format: uuid
        credentials:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [teacher, student]

    UpdateRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [teacher, student]

    JoinCourseRequest:
      type: object
      required: [inviteCode]
      properties:
        inviteCode:
          type: string

    JoinCourseResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        role:
          type: string
          enum: [student]

    # File schemas
    FileInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    FileUploadResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid

    # Post schemas
    PostType:
      type: string
      enum: [post, task]

    TaskType:
      type: string
      enum: [mandatory, optional]

    CreatePostRequest:
      type: object
      required: [type, title, text]
      properties:
        type:
          $ref: '#/components/schemas/PostType'
        title:
          type: string
        text:
          type: string
        deadline:
          type: string
          format: date-time
          nullable: true
        maxScore:
          type: integer
          default: 5
          nullable: true
        taskType:
          $ref: '#/components/schemas/TaskType'
          nullable: true
        solvableAfterDeadline:
          type: boolean
          nullable: true
        files:
          type: array
          items:
            type: string
            format: uuid
          nullable: true

    PostFeedItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/PostType'
        title:
          type: string
        createdDate:
          type: string
          format: date-time

    Post:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/PostType'
        title:
          type: string
        text:
          type: string
        deadline:
          type: string
          format: date-time
          nullable: true
        maxScore:
          type: integer
          nullable: true
        taskType:
          $ref: '#/components/schemas/TaskType'
          nullable: true
        solvableAfterDeadline:
          type: boolean
          nullable: true
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileInfo'
          nullable: true
        userSolution:
          type: object
          nullable: true

    IdResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid

    # Solution schemas
    SolutionStatus:
      type: string
      enum: [pending, checked, returned]

    SubmitSolutionRequest:
      type: object
      properties:
        text:
          type: string
          nullable: true
        files:
          type: array
          items:
            type: string
            format: uuid
          nullable: true

    Solution:
      type: object
      properties:
        text:
          type: string
          nullable: true
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileInfo'
          nullable: true
        score:
          type: integer
          nullable: true
        status:
          $ref: '#/components/schemas/SolutionStatus'
        updatedDate:
          type: string
          format: date-time

    SolutionWithUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user:
          type: object
          properties:
            id:
              type: string
              format: uuid
            credentials:
              type: string
        text:
          type: string
          nullable: true
        score:
          type: integer
          nullable: true
        status:
          $ref: '#/components/schemas/SolutionStatus'
        files:
          type: array
          items:
            $ref: '#/components/schemas/FileInfo'
          nullable: true
        updatedDate:
          type: string
          format: date-time

    ReviewRequest:
      type: object
      required: [score, status]
      properties:
        score:
          type: integer
        status:
          type: string
          enum: [checked, returned]
        comment:
          type: string
          nullable: true

    # Comment schemas
    CreateCommentRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string

    UpdateCommentRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string

    CommentAuthor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        credentials:
          type: string

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
        author:
          $ref: '#/components/schemas/CommentAuthor'
        nestedCount:
          type: integer

  parameters:
    skipParam:
      name: skip
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Сколько записей пропустить

    takeParam:
      name: take
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 10
      description: Сколько записей взять после пропуска

    statusParam:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [pending, checked, returned]
      description: Фильтр по статусу решения

    studentIdParam:
      name: studentId
      in: query
      required: false
      schema:
        type: string
        format: uuid
      description: Фильтр по конкретному ученику

    queryParam:
      name: query
      in: query
      required: false
      schema:
        type: string
      description: Поисковый запрос для фильтрации

security:
  - bearerAuth: []

paths:
  # Auth
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Успешная регистрация
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenResponse'

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Выход из системы
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Успешный выход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseWrapper'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Обновление токена
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Токен успешно обновлен
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TokenResponse'

  # User
  /users:
    get:
      tags: [User]
      summary: Получить данные о себе
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Данные пользователя
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
    put:
      tags: [User]
      summary: Обновить данные о себе
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Данные успешно обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseWrapper'

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [User]
      summary: Получить данные о пользователе
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Данные пользователя
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'

  /user/courses:
    get:
      tags: [User]
      summary: Получить список курсов пользователя
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список курсов пользователя
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          records:
                            type: array
                            items:
                              $ref: '#/components/schemas/UserCourse'
                          totalRecords:
                            type: integer

  # Course
  /course:
    post:
      tags: [Course]
      summary: Создать курс
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCourseRequest'
      responses:
        '200':
          description: Курс создан
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Course'

  /course/join:
    post:
      tags: [Course]
      summary: Присоединиться к курсу по коду
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinCourseRequest'
      responses:
        '200':
          description: Успешное присоединение к курсу
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/JoinCourseResponse'

  /course/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Course]
      summary: Получить информацию о курсе
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Информация о курсе
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CourseInfo'
    put:
      tags: [Course]
      summary: Изменить курс
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCourseRequest'
      responses:
        '200':
          description: Курс изменен
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Course'

  /course/{id}/leave:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Course]
      summary: Покинуть курс
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Курс покинут
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid

  /course/{id}/feed:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/skipParam'
      - $ref: '#/components/parameters/takeParam'
    get:
      tags: [Course]
      summary: Получить посты курса
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список постов курса
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          records:
                            type: array
                            items:
                              $ref: '#/components/schemas/PostFeedItem'
                          totalRecords:
                            type: integer

  /course/{id}/members:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/skipParam'
      - $ref: '#/components/parameters/takeParam'
      - $ref: '#/components/parameters/queryParam'
    get:
      tags: [Course]
      summary: Получить список участников курса
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список участников курса
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          records:
                            type: array
                            items:
                              $ref: '#/components/schemas/CourseMember'
                          totalRecords:
                            type: integer

  /course/{id}/members/{userId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Course]
      summary: Удалить участника из курса
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Участник удален
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid

  /course/{id}/members/{userId}/role:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: userId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [Course]
      summary: Изменить роль участника
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Роль изменена
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          role:
                            type: string
                            enum: [teacher, student]

  /course/{courseId}/task:
    parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Post]
      summary: Создать пост в курсе
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '200':
          description: Пост создан
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IdResponse'

  # Post
  /post/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Post]
      summary: Получить пост
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Информация о посте
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Post'
    put:
      tags: [Post]
      summary: Редактировать пост
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePostRequest'
      responses:
        '200':
          description: Пост отредактирован
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IdResponse'
    delete:
      tags: [Post]
      summary: Удалить пост
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Пост удален
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IdResponse'

  # Solution
  /task/{id}/solution:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      tags: [Solution]
      summary: Отправить или отредактировать решение
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitSolutionRequest'
      responses:
        '200':
          description: Решение отправлено
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IdResponse'
    delete:
      tags: [Solution]
      summary: Удалить решение
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Решение удалено
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IdResponse'
    get:
      tags: [Solution]
      summary: Получить своё решение по заданию
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Решение пользователя
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Solution'

  /task/{id}/solutions:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/skipParam'
      - $ref: '#/components/parameters/takeParam'
      - $ref: '#/components/parameters/statusParam'
      - $ref: '#/components/parameters/studentIdParam'
    get:
      tags: [Solution]
      summary: Получить список решений по заданию
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список решений
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          records:
                            type: array
                            items:
                              $ref: '#/components/schemas/SolutionWithUser'
                          totalRecords:
                            type: integer

  /solution/{solutionId}/review:
    parameters:
      - name: solutionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Solution]
      summary: Проверить решение
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
      responses:
        '200':
          description: Решение проверено
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseWrapper'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/IdResponse'

  # Comments
  /post/{id}/comment:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      tags: [Comment]
